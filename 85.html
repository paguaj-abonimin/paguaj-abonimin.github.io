<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paguaj Abonimin Online</title>
  
  <style>
    /* Base body styling to center the content */
    body {
        background: #f7f7f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    /* Modern card container */
    #smart-button-container {
        background: #ffffff;
        padding: 30px 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 400px; /* Limits width on desktop, full width on mobile */
        box-sizing: border-box;
    }

    /* Heading styling */
    .welcome-message {
        font-size: 22px;
        font-weight: 600;
        color: #2c3e50;
        margin-top: 0;
        margin-bottom: 20px;
    }

    /* Responsive, touch-friendly dropdowns */
    select {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border: 1px solid #dcdcdc;
        border-radius: 8px;
        font-size: 16px; /* 16px prevents iOS automatic zoom on focus */
        color: #333;
        background-color: #fff;
        box-sizing: border-box;
        cursor: pointer;
    }

    select:focus {
        outline: none;
        border-color: #0070ba;
        box-shadow: 0 0 0 2px rgba(0, 112, 186, 0.2);
    }

    /* Ensure the PayPal container spans the full width of the card */
    #paypal-button-container {
        width: 100%;
        margin-top: 10px;
    }
  </style>
</head>

<body>
    <div id="smart-button-container">
      <div style="text-align: center;">
        <div style="margin-bottom: 1.25rem;">
          <p class="welcome-message">Sistemi i pagesave online</p>
          <select id="item-options">
            <option value="Pakoja 1 vjeqare" price="80">Pakoja 1 vjeqare - 80 EUR</option>
            <option value="Pakoja 6 muaj" price="55">Pakoja 6 muaj - 55 EUR</option>
            <option value="Pakoja 3 muaj" price="35">Pakoja 3 muaj - 35 EUR</option>
          </select>
          <select style="visibility: hidden" id="quantitySelect">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
      <div id="paypal-button-container"></div>
      </div>
    </div>
    
    <script src="https://www.paypal.com/sdk/js?client-id=AY9MAS2a5PfniUIv4DjZ3Z_zdPAQYkOcYuRjqAvxB2IMBchXMJrhy2bxkg9ae-FlQXhDyUsM9MMOBmtO&enable-funding=venmo&currency=EUR" data-sdk-integration-source="button-factory"></script>
    <script>
      function initPayPalButton() {
        var shipping = 4;
        var itemOptions = document.querySelector("#smart-button-container #item-options");
        var quantity = parseInt(5);
        var quantitySelect = document.querySelector("#smart-button-container #quantitySelect");
        if (!isNaN(quantity)) {
          quantitySelect.style.visibility = "visible";
        }
        var orderDescription = 'Sistemi i pagesave online';
        if(orderDescription === '') {
          orderDescription = 'Item';
        }
        paypal.Buttons({
          style: {
            shape: 'rect',
            color: 'gold',
            layout: 'vertical',
            label: 'paypal',
          },
          createOrder: function(data, actions) {
            var selectedItemDescription = itemOptions.options[itemOptions.selectedIndex].value;
            var selectedItemPrice = parseFloat(itemOptions.options[itemOptions.selectedIndex].getAttribute("price"));
            var tax = (0 === 0 || false) ? 0 : (selectedItemPrice * (parseFloat(0)/100));
            if(quantitySelect.options.length > 0) {
              quantity = parseInt(quantitySelect.options[quantitySelect.selectedIndex].value);
            } else {
              quantity = 1;
            }
    
            tax *= quantity;
            tax = Math.round(tax * 100) / 100;
            var priceTotal = quantity * selectedItemPrice + parseFloat(shipping) + tax;
            priceTotal = Math.round(priceTotal * 100) / 100;
            var itemTotalValue = Math.round((selectedItemPrice * quantity) * 100) / 100;
    
            return actions.order.create({
              purchase_units: [{
                description: orderDescription,
                amount: {
                  currency_code: 'EUR',
                  value: priceTotal,
                  breakdown: {
                    item_total: {
                      currency_code: 'EUR',
                      value: itemTotalValue,
                    },
                    shipping: {
                      currency_code: 'EUR',
                      value: shipping,
                    },
                    tax_total: {
                      currency_code: 'EUR',
                      value: tax,
                    }
                  }
                },
                items: [{
                  name: selectedItemDescription,
                  unit_amount: {
                    currency_code: 'EUR',
                    value: selectedItemPrice,
                  },
                  quantity: quantity
                }]
              }]
            });
          },
          onApprove: function(data, actions) {
            return actions.order.capture().then(function(orderData) {
              
              // Full available details
              console.log('Capture result', orderData, JSON.stringify(orderData, null, 2));
    
              // Show a success message within this page, e.g.
              const element = document.getElementById('paypal-button-container');
              element.innerHTML = '';
              element.innerHTML = '<h3>Pagesa u realizua me sukses. Faleminderit!</h3>';
    
              // Or go to another URL:  actions.redirect('thank_you.html');
    
            });
          },
          onError: function(err) {
            console.log(err);
          },
        }).render('#paypal-button-container');
      }
      initPayPalButton();
    </script>
</body>
</html>

<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagesa e Suksesshme</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0ede8;
      --card-bg: #ffffff;
      --success: #166534;
      --success-light: #f0fdf4;
      --success-border: #bbf7d0;
      --text-primary: #1a1a1a;
      --text-muted: #6b7280;
      --border: #e5e1da;
      --shadow: 0 4px 24px rgba(26, 60, 94, 0.08);
      --radius: 14px;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Subtle background texture matching the main page */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(22,101,52,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(22,101,52,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 32px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: var(--success-light);
      border: 4px solid var(--success-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--success);
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 24px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>Faleminderit!</h1>
    <p>Pagesa juaj u realizua me sukses dhe pakoja juaj u aktivizua.</p>
  </div>
</body>
</html>
